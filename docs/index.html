<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="图标.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的世界物品百科</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f0;--surface:#fff;--bg-hover:#eeece6;--text:#1a1a1a;--text-secondary:#5c5c5c;--text-muted:#9a9a9a;--accent:#4a7c59;--accent-light:#e8f0e8;--accent-dark:#2d5c3d;--border:#dbd8d0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'Noto Sans SC','Microsoft YaHei',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.hidden{display:none!important}

/* search */
.search-wrapper{position:relative;z-index:100;width:420px;max-width:88vw;margin:0 0 -8px}
.search-input{width:100%;height:48px;padding:0 48px 0 20px;border:1.5px solid var(--border);border-radius:12px;background:var(--surface);color:var(--text);font-size:15px;outline:none;transition:all .25s;box-shadow:0 3px 12px rgba(0,0,0,.07),inset 0 1px 3px rgba(0,0,0,.04)}
.search-input:focus{border-color:var(--accent);border-width:2px;box-shadow:0 3px 16px rgba(74,124,89,.18),inset 0 1px 3px rgba(0,0,0,.04)}
.search-input::placeholder{color:var(--text-muted)}
.search-icon{position:absolute;right:20px;top:50%;transform:translateY(-50%);width:18px;height:18px;pointer-events:none}
.suggestions{position:absolute;top:60px;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;max-height:360px;overflow-y:auto;display:none;z-index:20;box-shadow:0 8px 32px rgba(0,0,0,.1)}
.suggestions.active{display:block}
.sug-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;border-bottom:1px solid rgba(0,0,0,.04)}
.sug-item:last-child{border-bottom:none}.sug-item:hover{background:var(--accent-light)}
.sug-item img{width:28px;height:28px;border-radius:4px}.sug-info{flex:1}.sug-zh{font-size:14px;color:var(--text)}.sug-en{font-size:11px;color:var(--text-muted)}
.sug-empty{padding:24px;text-align:center;color:var(--text-muted);font-size:14px}

/* scene */
.scene-area{position:relative;z-index:5;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%}
#homeView{display:flex;flex-direction:column;align-items:center}
.cube-svg{width:min(520px,88vw);height:min(520px,88vw);cursor:default}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.cube-svg.animated{animation:float 6s ease-in-out infinite}

/* face cells */
.face-cell{cursor:pointer}
.face-cell .hit-area{fill:transparent;stroke:none;transition:fill .2s}
.face-cell:hover .hit-area{fill:rgba(92,122,92,0.15)}
.cell-icon{pointer-events:none;transition:transform .2s}
.cell-label{pointer-events:none;opacity:0;transition:opacity .3s ease;font-size:15px;fill:#3d5c3d;text-anchor:middle}
.face-cell:hover .cell-label{opacity:1;transition-delay:.1s}

/* icon float animation on hover */
@keyframes icon-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.face-cell:hover .cell-icon{
  animation:icon-float 1.2s ease-in-out infinite;
  transform-box:fill-box;
  transform-origin:center bottom;
}

/* sponsor */
.sponsor-wrap{position:relative;z-index:10;margin:16px 0 24px;text-align:center}
.sponsor-btn{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;letter-spacing:1px;transition:color .2s;padding:6px 12px;font-family:inherit}
.sponsor-btn:hover{color:var(--accent)}
.sponsor-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center}
.sponsor-modal.active{display:flex}
.sponsor-modal img{max-width:320px;max-height:80vh;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.3);background:#fff;padding:12px}
.sponsor-close{position:absolute;top:16px;right:24px;width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,.9);font-size:20px;cursor:pointer;color:#666}

/* title */
.site-title{margin:30px 0 100px;text-align:center;padding:0 16px}
.site-title h1{font-family:'Press Start 2P',monospace;font-size:20px;font-weight:400;color:#3d5c3d;letter-spacing:2px;line-height:1.6;text-shadow:3px 3px 0 rgba(0,0,0,.15)}
@media(max-width:600px){.site-title h1{font-size:13px;letter-spacing:1px}}

/* browser */
.browser-view{display:none;width:100%;max-width:1000px;padding:0 16px;margin:12px auto}
.scene-area.browse-mode{justify-content:flex-start}
.browser-view.active{display:block}
.breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:12px;font-size:14px;flex-wrap:wrap}
.breadcrumb span{color:var(--text-muted)}.bcrumb-link{color:var(--accent);cursor:pointer}.bcrumb-link:hover{color:var(--accent-dark)}.bcrumb-active{color:var(--text);font-weight:600}
.sub-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.sub-tab{padding:6px 16px;border-radius:16px;border:1px solid var(--border);background:var(--surface);font-size:13px;cursor:pointer;transition:all .15s;color:var(--text-secondary)}
.sub-tab:hover{background:var(--bg-hover)}.sub-tab.active{background:var(--accent-light);color:var(--accent-dark);border-color:var(--accent);font-weight:600}
.item-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
@media(max-width:800px){.item-grid{grid-template-columns:repeat(4,1fr)}}@media(max-width:500px){.item-grid{grid-template-columns:repeat(3,1fr)}}
.item-cell{display:flex;flex-direction:column;align-items:center;padding:8px 4px;border-radius:8px;cursor:pointer;transition:background .12s;background:var(--surface);border:1px solid var(--border)}
.item-cell:hover{background:var(--bg-hover)}.item-cell img{width:40px;height:40px;border-radius:4px;margin-bottom:4px}
.ic-name{font-size:11px;color:var(--text-secondary);text-align:center;line-height:1.3;max-height:30px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

/* detail panel */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;display:none}.overlay.active{display:block}
.detail-panel{position:fixed;top:0;right:0;width:420px;max-width:100vw;height:100vh;background:var(--surface);z-index:201;overflow-y:auto;transform:translateX(100%);transition:transform .3s ease-out;box-shadow:-4px 0 32px rgba(0,0,0,.25)}
.detail-panel.active{transform:translateX(0)}
.detail-close{position:sticky;top:12px;float:right;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface);font-size:18px;cursor:pointer;z-index:5;margin-right:12px;display:flex;align-items:center;justify-content:center;color:var(--text-muted)}
.detail-close:hover{background:var(--bg-hover)}.detail-content{padding:16px 24px}
.detail-header{display:flex;gap:16px;align-items:flex-start;margin-bottom:20px}
.detail-header img{width:64px;height:64px;border-radius:8px;flex-shrink:0}
.detail-header h2{font-size:22px;color:var(--text)}.dh-en{font-size:14px;color:var(--text-muted)}.dh-id{font-size:11px;color:var(--text-muted);font-family:monospace}
.detail-section{margin-bottom:18px}.detail-section h3{font-size:14px;color:#3d5c3d;margin-bottom:8px;padding-bottom:0;padding-left:8px;border-left:3px solid #4a7c59}
.acq-tags{display:flex;flex-wrap:wrap;gap:6px}.acq-tag{padding:4px 10px;border-radius:12px;background:var(--accent-light);color:var(--accent-dark);font-size:12px}
.craft-grid{display:flex;gap:16px;align-items:center;flex-wrap:wrap}.craft-table{display:grid;grid-template-columns:repeat(3,44px);grid-template-rows:repeat(3,44px);gap:2px}
.craft-cell{width:44px;height:44px;border:1px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;background:#faf8f4}
.craft-cell img{width:32px;height:32px}.craft-cell.empty{background:transparent;border-style:dashed;border-color:#e8e6e0}
.craft-arrow{font-size:24px;color:var(--text-muted)}.craft-result{display:flex;flex-direction:column;align-items:center;gap:4px}
.craft-result img{width:44px;height:44px;border-radius:4px}.craft-result span{font-size:12px;color:var(--text-secondary)}
.proc-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px;color:var(--text-secondary);flex-wrap:wrap}
.proc-row img{width:32px;height:32px;border-radius:4px}.proc-arrow{margin:0 4px;color:var(--text-muted)}
.acq-detail{font-size:13px;color:var(--text-secondary);line-height:1.6;padding-left:8px;border-left:2px solid var(--accent-light)}
@media(max-width:600px){.detail-panel{width:100vw}.search-wrapper{width:92vw}}
</style>
</head>
<body>


<div class="scene-area" id="sceneArea">
  <div id="homeView">
<div class="site-title"><h1>我的世界物品百科</h1></div>
<div class="search-wrapper">
  <input type="text" class="search-input" id="searchInput" placeholder="搜索物品中文名、英文名或 ID" autocomplete="off">
  <span class="search-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9a9a9a" stroke-width="2.2" stroke-linecap="round"><circle cx="10.5" cy="10.5" r="7"/><line x1="16" y1="16" x2="22" y2="22"/></svg></span>
  <div class="suggestions" id="suggestions"></div>

</div>


    <!--
      viewBox="-260 -260 520 520"
      等轴测顶面顶点（放大2倍后）：
        top=(0,-188), right=(162,-94), bottom=(0,0), left=(-162,-94)
      步进向量：r=(54,31.333), d=(-54,31.333)
      格子(row,col)中心 = top + (col+0.5)*r + (row+0.5)*d
    -->
    <svg class="cube-svg animated" viewBox="-260 -260 520 520" xmlns="http://www.w3.org/2000/svg" id="cubeSVG"></svg>
  </div>
  <div class="browser-view" id="browserView">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="sub-tabs" id="subTabs"></div>
    <div class="item-grid" id="itemGrid"></div>
  </div>
</div>


<div class="overlay" id="overlay"></div>
<div class="detail-panel" id="detailPanel"><button class="detail-close" id="detailClose">&times;</button><div class="detail-content" id="detailContent"></div></div>

<script>
// ==================== DATA ====================
let DATA=null,ITEMS=[],CATEGORIES=[],IM={},CM={};
async function loadData(){
  if(DATA)return DATA;
  const r=await fetch('./data/data.json');
  DATA=await r.json();
  ITEMS=DATA.items||[];
  CATEGORIES=DATA.categories||[];
  ITEMS.forEach(i=>IM[i.id]=i);
  CATEGORIES.forEach(c=>CM[c.id]=c);
  return DATA;
}

// ==================== IMAGE HELPERS ====================
function placeholderSVG(alt,sz){
  const s=`<svg xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}" viewBox="0 0 32 32"><rect width="32" height="32" rx="4" fill="#dbd8d0"/><text x="16" y="21" text-anchor="middle" font-size="14" fill="#9a9a9a" font-family="sans-serif">${(alt||'?')[0]||'?'}</text></svg>`;
  return 'data:image/svg+xml,'+encodeURIComponent(s.trim());
}
function mkImg(url,alt,sz){
  if(!url||typeof url!=='string'||!url.trim())return placeholderSVG(alt,sz);
  return url.trim();
}
function createImg(url,alt,sz){
  const img=document.createElement('img');
  img.src=mkImg(url,alt,sz);
  img.alt=alt||'';
  img.width=sz;img.height=sz;
  img.onerror=function(){this.src=placeholderSVG(alt,sz)};
  return img;
}

// ==================== CUBE ====================
const CAT_ICONS={
  building_blocks:'dirt',
  colored_blocks:'ominous_banner',
  natural_blocks:'oak_leaves',
  functional_blocks:'redstone_dust',
  tools:'diamond_pickaxe',
  combat:'diamond_chestplate',
  food:'apple',
  materials:'stick',
  miscellaneous:'netherite_upgrade_smithing_template'
};

/*
  等轴测顶面（放大2倍）：
    top=(0,-188), right=(162,-94), bottom=(0,0), left=(-162,-94)
  步进向量：
    r = (right - top) / 3 = (162, 94) / 3 = (54, 31.333)
    d = (left  - top) / 3 = (-162, 94) / 3 = (-54, 31.333)
  格子(row,col)中心 = top + (col+0.5)*r + (row+0.5)*d
    = (0,-188) + (col+0.5)*(54,31.333) + (row+0.5)*(-54,31.333)
  菱形半轴：rx = |r.x| = 54, ry = r.y = 31.333
  但 rx=54 会让相邻菱形边缘紧贴，留点余量用 rx=46, ry=26.667
*/
const RX = 46, RY = 26.667;
function cellCenter(row, col){
  const tx=0, ty=-188;
  const rx=54, ry=31.333;
  const dx=-54, dy=31.333;
  return {
    cx: tx + (col+0.5)*rx + (row+0.5)*dx,
    cy: ty + (col+0.5)*ry + (row+0.5)*dy
  };
}

// 预计算9个格子中心，按 row 0-2, col 0-2 排列
// 映射到9个大类的顺序：从左上到右下
const CELL_ORDER = [
  [0,0],[0,1],[0,2],
  [1,0],[1,1],[1,2],
  [2,0],[2,1],[2,2]
];

function buildCubeSVG(){
  const svg = document.getElementById('cubeSVG');
  let h = `<g stroke-linecap="round" stroke-linejoin="round">`;

  // ── 正六边形轮廓 ──
    // 三面填色（模拟等轴测光照）
  h += `<polygon points="0,-188 162,-94 0,0 -162,-94" fill="#d4e8d4" opacity="0.7"/>`;
  h += `<polygon points="162,-94 162,94 0,188 0,0" fill="#8aaa8a" opacity="0.6"/>`;
  h += `<polygon points="-162,-94 0,0 0,188 -162,94" fill="#5c7a5c" opacity="0.5"/>`;
  // 六边形轮廓
  h += `<polygon points="0,-188 162,-94 162,94 0,188 -162,94 -162,-94" fill="none" stroke="#4a7c59" stroke-width="1.8"/>`;

  // ── 三条内线（六边形中心三等分） ──
  h += `<line x1="162" y1="-94" x2="0" y2="0" stroke="#4a7c59" stroke-width="1.8"/>`;
  h += `<line x1="0" y1="188" x2="0" y2="0" stroke="#4a7c59" stroke-width="1.8"/>`;
  h += `<line x1="-162" y1="-94" x2="0" y2="0" stroke="#4a7c59" stroke-width="1.8"/>`;

  // ── 顶面 3×3 格线 ──
  // 沿 r=(54,31.333) 方向的 4 条线（从 top 侧的各格线起点）
  // 沿 d=(-54,31.333) 方向的 4 条线
  // 格线端点：沿 r 方向，起点 = top + k*d, 终点 = 起点 + 3*r，k=0,1,2,3
  // 沿 d 方向，起点 = top + k*r, 终点 = 起点 + 3*d，k=0,1,2,3
  const T={x:0,y:-188}, R={x:54,y:31.333}, D={x:-54,y:31.333};
  h += `<g fill="none" stroke="#4a7c59" stroke-width="1.5" opacity="0.4">`;
  for(let k=0;k<=3;k++){
    // 沿 r 方向
    const sx1 = T.x + k*D.x, sy1 = T.y + k*D.y;
    const ex1 = sx1 + 3*R.x,  ey1 = sy1 + 3*R.y;
    h += `<line x1="${sx1.toFixed(2)}" y1="${sy1.toFixed(2)}" x2="${ex1.toFixed(2)}" y2="${ey1.toFixed(2)}"/>`;
    // 沿 d 方向
    const sx2 = T.x + k*R.x, sy2 = T.y + k*R.y;
    const ex2 = sx2 + 3*D.x,  ey2 = sy2 + 3*D.y;
    h += `<line x1="${sx2.toFixed(2)}" y1="${sy2.toFixed(2)}" x2="${ex2.toFixed(2)}" y2="${ey2.toFixed(2)}"/>`;
  }
  h += `</g>`;

  // ── 9 个大类图标 ──
  CATEGORIES.forEach((cat, i) => {
    if(i >= CELL_ORDER.length) return;
    const [row, col] = CELL_ORDER[i];
    const {cx, cy} = cellCenter(row, col);

    const iconId = CAT_ICONS[cat.id] || cat.icon_item || '';
    const iconItem = IM[iconId];
    const iconUrl = iconItem ? iconItem.icon_url : '';
    const imgSrc = mkImg(iconUrl, cat.name_zh, 48);
    const ph = placeholderSVG(cat.name_zh, 48);

    // 菱形热区顶点
    const pts = `${cx},${cy-RY} ${cx+RX},${cy} ${cx},${cy+RY} ${cx-RX},${cy}`;

    h += `<g class="face-cell" data-cat="${cat.id}">`;
    // 透明菱形作为点击 & hover 热区
    h += `<polygon class="hit-area" points="${pts}"/>`;
    // 图标居中（48×48，偏移 -24）
    // onerror 内不能嵌套引号，改用 data-ph 属性存 placeholder，JS 统一绑定
    h += `<image class="cell-icon" href="${imgSrc}" x="${(cx-24).toFixed(2)}" y="${(cy-24).toFixed(2)}" width="48" height="48" data-ph="${encodeURIComponent(cat.name_zh)}"/>`;
    // 悬停标签，显示在菱形下方
    h += `<text class="cell-label" x="${cx.toFixed(2)}" y="${(cy+RY+22).toFixed(2)}">${cat.name_zh}</text>`;
    h += `</g>`;
  });

  h += `</g>`;
  svg.innerHTML = h;

  // 绑定图标加载失败时替换 placeholder（onerror 不能内联，避免引号冲突）
  svg.querySelectorAll('image.cell-icon').forEach(img => {
    const ph = img.getAttribute('data-ph');
    if(ph) img.addEventListener('error', function(){
      this.setAttribute('href', placeholderSVG(decodeURIComponent(ph), 48));
    });
  });

  // 绑定点击事件
  svg.querySelectorAll('.face-cell').forEach(el => {
    el.addEventListener('click', () => {
      const catId = el.dataset.cat;
      if(catId) showBrowser(catId, null, true);
    });
  });
}

// ==================== SEARCH ====================
function doSearch(q){
  const s=document.getElementById('suggestions');
  q=q.toLowerCase().trim();
  if(!q){s.classList.remove('active');return;}
  const r=[];
  for(const item of ITEMS){
    if(r.length>=10)break;
    const id=(item.id||'').toLowerCase(),zh=(item.name_zh||'').toLowerCase(),en=(item.name_en||'').toLowerCase();
    if(id.includes(q)||zh.includes(q)||en.includes(q))r.push(item);
  }
  s.innerHTML='';
  if(!r.length){
    s.innerHTML='<div class="sug-empty">无搜索结果</div>';
  } else {
    for(const item of r){
      const d=document.createElement('div');d.className='sug-item';
      d.appendChild(createImg(item.icon_url,item.name_zh,28));
      const info=document.createElement('div');info.className='sug-info';
      info.innerHTML=`<div class="sug-zh">${item.name_zh||''}</div><div class="sug-en">${item.name_en||''}</div>`;
      d.appendChild(info);
      d.addEventListener('click',()=>{openDetail(item.id);document.getElementById('searchInput').value=item.name_zh||'';s.classList.remove('active');});
      s.appendChild(d);
    }
  }
  s.classList.add('active');
}

// ==================== ROUTING ====================
function parseHash(){
  const h=window.location.hash.replace('#','')||'browser';
  const r={cat:null,sub:null,item:null};
  const parts=h.split('#');
  for(const p of parts){
    if(p.startsWith('browser')){const seg=p.split('/');r.cat=seg[1]||null;r.sub=seg[2]||null;}
    else if(p.startsWith('item/')){r.item=p.replace('item/','');}
  }
  return r;
}
let _currentCat=null,_currentSub=null;
function updateHash(cat,sub,item){
  if(cat){_currentCat=cat;_currentSub=sub||null;}
  let h='browser';
  if(_currentCat){h+='/'+_currentCat;if(_currentSub)h+='/'+_currentSub;}
  if(item)h+='#item/'+item;
  history.pushState(null,'','#'+h);
}

// ==================== VIEWS ====================
function showHome(){
  document.getElementById('homeView').style.display='';
  document.getElementById('browserView').classList.remove('active');
  document.getElementById('sceneArea').classList.remove('browse-mode');
  document.getElementById('cubeSVG').classList.add('animated');
}
function showBrowser(catId,subId,updH){
  document.getElementById('browserView').classList.add('active');
  document.getElementById('homeView').style.display='none';
  document.getElementById('sceneArea').classList.add('browse-mode');
  const cat=CM[catId];if(!cat)return;
  const subcats=cat.subcategories||[];
  const activeSub=subId||(subcats[0]?subcats[0].id:null);
  const bc=document.getElementById('breadcrumb');bc.innerHTML='';
  const all=el('span','bcrumb-link','全部');
  all.addEventListener('click',()=>{showHome();updateHash(null,null,null);});
  bc.appendChild(all);bc.appendChild(txt(' > '));
  if(activeSub){
    const cs=el('span','bcrumb-link',cat.name_zh);
    cs.addEventListener('click',()=>showBrowser(catId,null,true));
    bc.appendChild(cs);bc.appendChild(txt(' > '));
    const sub=subcats.find(s=>s.id===activeSub);
    if(sub){bc.appendChild(el('span','bcrumb-active',sub.name_zh));}
  } else {
    bc.appendChild(el('span','bcrumb-active',cat.name_zh));
  }
  const tabs=document.getElementById('subTabs');tabs.innerHTML='';
  subcats.forEach(s=>{
    const t=el('button','sub-tab'+(s.id===activeSub?' active':''),s.name_zh);
    t.addEventListener('click',()=>showBrowser(catId,s.id,true));
    tabs.appendChild(t);
  });
  const grid=document.getElementById('itemGrid');grid.innerHTML='';
  if(activeSub){
    const sub=subcats.find(s=>s.id===activeSub);
    (sub?sub.items:[]).forEach(iid=>{
      const item=IM[iid];if(!item)return;
      const cell=el('div','item-cell');
      cell.appendChild(createImg(item.icon_url,item.name_zh,40));
      cell.appendChild(el('span','ic-name',item.name_zh));
      cell.title=item.name_en||'';
      cell.addEventListener('click',()=>openDetail(iid));
      grid.appendChild(cell);
    });
  }
  if(updH!==false)updateHash(catId,activeSub,null);
}
function el(tag,cls,text){const e=document.createElement(tag);if(cls)e.className=cls;if(text)e.textContent=text;return e;}
function txt(t){const s=document.createElement('span');s.textContent=t;return s;}

// ==================== DETAIL PANEL ====================
function openDetail(itemId){
  const item=IM[itemId];if(!item)return;
  const panel=document.getElementById('detailPanel'),
        overlay=document.getElementById('overlay'),
        ct=document.getElementById('detailContent');
  const nz=item.name_zh||'',ne=item.name_en||'',cat=CM[item.category];
  let h=`<div class="detail-header">`;
  h+=`<img src="${mkImg(item.icon_url,nz,64)}" alt="${nz}" width="64" height="64">`;
  h+=`<div><h2>${nz}</h2><div class="dh-en">${ne}</div><div class="dh-id">${item.id}</div><div class="dh-id">${cat?cat.name_zh:''} / ${item.subcategory||''}</div></div></div>`;
  const methods=item.acquisition?.methods||[];
  if(methods.length){h+=`<div class="detail-section"><h3>获取方式</h3><div class="acq-tags">${methods.map(m=>`<span class="acq-tag">${m}</span>`).join('')}</div></div>`;}
  if(item.crafting&&item.crafting.length){
    h+=`<div class="detail-section"><h3>合成配方</h3>`;
    item.crafting.forEach((r,i)=>{h+=buildCraft(r,item);if(i<item.crafting.length-1)h+='<hr style="margin:12px 0;border-color:var(--border)">';});
    h+=`</div>`;
  }
  const smelting=item.acquisition?.smelting;
  if(smelting){
    const list=Array.isArray(smelting)?smelting:[smelting];
    h+=`<div class="detail-section"><h3>烧炼配方</h3>`;
    list.forEach(s=>{
      h+=`<div class="proc-row"><img src="${mkImg(s.input_icon||'',s.input_id,32)}" width="32" height="32"> → 🔥 → <img src="${mkImg(s.output_icon||'',s.output_id,32)}" width="32" height="32"> ×${s.output_count||1}</div>`;
      if(s.experience)h+=`<div style="font-size:12px;color:var(--text-muted)">经验:${s.experience} 时间:${s.cook_time_seconds||10}s</div>`;
    });
    h+=`</div>`;
  }
  if(item.stonecutting&&item.stonecutting.length){
    h+=`<div class="detail-section"><h3>切石配方</h3>`;
    item.stonecutting.forEach(s=>{h+=`<div class="proc-row"><img src="${mkImg(s.input_icon||'',s.input_id,32)}" width="32" height="32"> → <img src="${mkImg(s.output_icon||'',s.output_id,32)}" width="32" height="32"> ×${s.output_count||1}</div>`;});
    h+=`</div>`;
  }
  if(item.smithing&&item.smithing.length){
    h+=`<div class="detail-section"><h3>锻造配方</h3>`;
    item.smithing.forEach(s=>{h+=`<div class="proc-row"><img src="${mkImg(s.template_icon||'',s.template_id,32)}" width="32" height="32"> + <img src="${mkImg(s.base_icon||'',s.base_id,32)}" width="32" height="32"> + <img src="${mkImg(s.addition_icon||'',s.addition_id,32)}" width="32" height="32"> → <img src="${mkImg(s.output_icon||'',s.output_id,32)}" width="32" height="32"></div>`;});
    h+=`</div>`;
  }
  const natGen=item.acquisition?.natural_generation;
  if(natGen&&natGen.length){h+=`<div class="detail-section"><h3>自然生成</h3><div class="acq-detail">${natGen.map(g=>`<p>${g}</p>`).join('')}</div></div>`;}
  ct.innerHTML=h;
  panel.classList.add('active');
  overlay.classList.add('active');
  updateHash(null,null,itemId);
}
function buildCraft(r,item){
  let h='<div class="craft-grid"><div class="craft-table">';
  const pattern=r.pattern||[],ings=r.ingredients||{};
  for(let row=0;row<3;row++){
    for(let col=0;col<3;col++){
      const key=(pattern[row]||[])[col]||'';
      if(key&&ings[key]){const ing=ings[key];h+=`<div class="craft-cell"><img src="${mkImg(ing.icon_url||'',ing.name_zh||key,32)}" width="32" height="32"></div>`;}
      else{h+='<div class="craft-cell empty"></div>';}
    }
  }
  h+=`</div><span class="craft-arrow">→</span><div class="craft-result"><img src="${mkImg(r.result_icon||item.icon_url,r.result_id||item.id,44)}" width="44" height="44"><span>${(IM[r.result_id]||{}).name_zh||r.result_id||''}${(r.result_count||1)>1?' ×'+r.result_count:''}</span></div></div>`;
  h+=`<div style="margin-top:4px;font-size:12px;color:var(--text-muted)">${r.shaped?'有序合成(工作台)':'无序合成'}</div>`;
  return h;
}
function closeDetail(){
  document.getElementById('detailPanel').classList.remove('active');
  document.getElementById('overlay').classList.remove('active');
  if(_currentCat){showBrowser(_currentCat,_currentSub,false);}
  else{showHome();}
}
document.getElementById('detailClose').addEventListener('click',closeDetail);
document.getElementById('overlay').addEventListener('click',closeDetail);
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('detailPanel').classList.contains('active')){closeDetail();}
    else{document.getElementById('searchInput').value='';document.getElementById('suggestions').classList.remove('active');}
  }
});

// ==================== INIT ====================
async function init(){
  await loadData();
  buildCubeSVG();
  const r=parseHash();
  if(r.item){showHome();openDetail(r.item);}
  else if(r.cat){showBrowser(r.cat,r.sub,false);}
  else{showHome();}
  const si=document.getElementById('searchInput');
  si.addEventListener('input',()=>doSearch(si.value));
  si.addEventListener('keydown',e=>{if(e.key==='Enter'){const f=document.querySelector('.sug-item');if(f)f.click();}});
  document.addEventListener('click',e=>{if(!e.target.closest('.search-wrapper'))document.getElementById('suggestions').classList.remove('active');});
  window.addEventListener('hashchange',()=>{
    const r2=parseHash();
    if(r2.item){openDetail(r2.item);}
    else if(r2.cat){showBrowser(r2.cat,r2.sub,false);}
    else{showHome();}
  });
}
init();
</script>
