<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="我的世界物品百科 — Minecraft 1.21.11 全物品合成配方查询">
  <title>我的世界物品百科</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== 顶部搜索栏 ===== -->
  <header class="search-header" role="search" aria-label="物品搜索">
    <div class="search-wrapper">
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.3-4.3"/>
      </svg>
      <input
        type="text"
        id="search-input"
        class="search-input"
        placeholder="搜索物品（中文名 / 英文名 / ID）..."
        autocomplete="off"
        aria-label="搜索物品"
        aria-expanded="false"
        aria-controls="search-suggestions"
        role="combobox"
      >
      <button class="search-clear hidden" id="search-clear" aria-label="清除搜索">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="search-suggestions hidden" id="search-suggestions" role="listbox" aria-label="搜索建议"></div>
  </header>

  <!-- ===== 主内容区 ===== -->
  <main class="main-content" id="main-content">

    <!-- 浏览模式 -->
    <section class="browser" id="browser-root" aria-label="物品浏览">

      <!-- 面包屑导航 -->
      <nav class="breadcrumb" id="breadcrumb" aria-label="导航路径">
        <span class="breadcrumb-item breadcrumb-active" data-route="#">全部</span>
      </nav>

      <!-- 第一层：大类网格 -->
      <div class="category-grid" id="category-grid" role="list" aria-label="物品大类"></div>

      <!-- 第二层：小类标签页 -->
      <div class="subcategory-tabs hidden" id="subcategory-tabs" role="tablist" aria-label="物品小类"></div>

      <!-- 第三层：物品网格 -->
      <div class="item-grid hidden" id="item-grid" role="list" aria-label="物品列表"></div>

      <!-- 骨架屏：大类加载占位 -->
      <div class="skeleton-category-grid hidden" id="skeleton-categories" aria-hidden="true">
        <div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div>
        <div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div>
        <div class="skeleton-card"></div><div class="skeleton-card"></div>
      </div>

      <!-- 骨架屏：物品加载占位 -->
      <div class="skeleton-item-grid hidden" id="skeleton-items" aria-hidden="true">
        <div class="skeleton-item"></div><div class="skeleton-item"></div><div class="skeleton-item"></div>
        <div class="skeleton-item"></div><div class="skeleton-item"></div><div class="skeleton-item"></div>
        <div class="skeleton-item"></div><div class="skeleton-item"></div><div class="skeleton-item"></div>
        <div class="skeleton-item"></div><div class="skeleton-item"></div><div class="skeleton-item"></div>
        <div class="skeleton-item"></div>
      </div>

      <!-- 浏览模式空状态 -->
      <div class="browser-empty hidden" id="browser-empty">
        <p>请选择一个大类开始浏览</p>
      </div>
    </section>

  </main>

  <!-- ===== 详情面板遮罩 ===== -->
  <div class="detail-overlay hidden" id="detail-overlay" aria-hidden="true"></div>

  <!-- ===== 详情侧边栏 ===== -->
  <aside class="detail-panel hidden" id="detail-panel" role="dialog" aria-modal="true" aria-label="物品详情">
    <button class="detail-close" id="detail-close" aria-label="关闭详情">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>

    <div class="detail-body" id="detail-body">
      <!-- 头部：图标 + 名称 + ID -->
      <div class="detail-header">
        <img class="detail-icon" id="detail-icon" src="" alt="" width="64" height="64">
        <div class="detail-names">
          <h2 class="detail-name-zh" id="detail-name-zh"></h2>
          <p class="detail-name-en" id="detail-name-en"></p>
          <p class="detail-id" id="detail-id"></p>
          <div class="detail-tags">
            <span class="detail-tag" id="detail-tag-category"></span>
            <span class="detail-tag" id="detail-tag-subcategory"></span>
          </div>
        </div>
      </div>

      <div class="detail-divider"></div>

      <!-- 获取方式 -->
      <section class="detail-section" id="detail-section-acquisition">
        <h3 class="detail-section-title">获取方式</h3>
        <ul class="acquisition-list" id="acquisition-list"></ul>
        <div class="acquisition-extra" id="acquisition-natural"></div>
        <div class="acquisition-extra" id="acquisition-trading"></div>
      </section>

      <div class="detail-divider"></div>

      <!-- 合成配方 -->
      <section class="detail-section hidden" id="detail-section-crafting">
        <h3 class="detail-section-title">合成配方</h3>
        <div class="crafting-recipes" id="crafting-recipes"></div>
      </section>

      <div class="detail-divider hidden" id="divider-smelting"></div>

      <!-- 烧炼 / 切石 / 锻造配方 -->
      <section class="detail-section hidden" id="detail-section-processing">
        <h3 class="detail-section-title">加工配方</h3>
        <div class="processing-recipes" id="processing-recipes"></div>
      </section>

      <div class="detail-divider hidden" id="divider-natural"></div>

      <!-- 自然生成 -->
      <section class="detail-section hidden" id="detail-section-natural">
        <h3 class="detail-section-title">自然生成</h3>
        <ul class="natural-list" id="natural-list"></ul>
      </section>

      <div class="detail-divider hidden" id="divider-related"></div>

      <!-- 合成来源 (JEI) -->
      <section class="detail-section hidden" id="detail-section-sources">
        <h3 class="detail-section-title">合成来源</h3>
        <div class="related-items" id="sources-list"></div>
      </section>

      <div class="detail-divider hidden" id="divider-uses"></div>

      <!-- 可合成为 (JEI) -->
      <section class="detail-section hidden" id="detail-section-uses">
        <h3 class="detail-section-title">可合成为</h3>
        <div class="related-items" id="uses-list"></div>
      </section>

      <div class="detail-divider hidden" id="divider-related-bottom"></div>

      <!-- 相关物品 -->
      <section class="detail-section hidden" id="detail-section-related">
        <h3 class="detail-section-title">相关物品</h3>
        <div class="related-items" id="related-items"></div>
      </section>

      <!-- 详情骨架屏 -->
      <div class="skeleton-detail hidden" id="skeleton-detail" aria-hidden="true">
        <div class="skeleton-line skeleton-line-long"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line skeleton-line-short"></div>
        <div class="skeleton-block"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line skeleton-line-long"></div>
      </div>
    </div>
  </aside>

  <!-- ===== HTML Templates (零运行时解析开销) ===== -->

  <!-- 大类卡片模板 -->
  <template id="tpl-category-card">
    <div class="category-card" role="listitem">
      <img src="" alt="" width="48" height="48" loading="lazy">
      <span class="category-card-name"></span>
      <span class="category-card-count"></span>
    </div>
  </template>

  <!-- 物品格子模板 -->
  <template id="tpl-item-cell">
    <div class="item-cell" role="listitem">
      <img src="" alt="" width="32" height="32" loading="lazy">
      <span class="item-cell-name"></span>
    </div>
  </template>

  <!-- 搜索建议项模板 -->
  <template id="tpl-suggestion-item">
    <div class="suggestion-item" role="option">
      <img src="" alt="" width="24" height="24" loading="lazy">
      <span class="suggestion-name-zh"></span>
      <span class="suggestion-name-en"></span>
    </div>
  </template>

  <!-- 相关物品模板 -->
  <template id="tpl-related-item">
    <div class="related-item">
      <img src="" alt="" width="32" height="32" loading="lazy">
      <span class="related-item-name"></span>
    </div>
  </template>

  <!-- ===== JavaScript ===== -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
